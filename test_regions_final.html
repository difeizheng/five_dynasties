<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>政权地图测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), '#ffffff');

        // 省份 - 颜色映射
        var provinceColorMap = {
            "河南": "#e74c3c",
            "山东": "#e74c3c",
            "陕西": "#d35400",
            "河北": "#2ecc71",
            "山西": "#95a5a6",
            "安徽": "#e74c3c",
            "浙江": "#1abc9c",
            "上海": "#1abc9c",
            "江苏": "#e74c3c",
            "江西": "#e74c3c",
            "湖北": "#1abc9c",
            "四川": "#d35400",
            "重庆": "#d35400",
            "福建": "#9b59b6",
            "广东": "#3498db",
            "广西": "#3498db",
            "海南": "#3498db",
            "湖南": "#3498db"
        };

        // 省份 - 政权映射
        var provinceRegimeMap = {
            "河南": "后周",
            "山东": "后周",
            "陕西": "后蜀",
            "河北": "后周",
            "山西": "北汉",
            "安徽": "南唐",
            "浙江": "吴越",
            "上海": "吴越",
            "江苏": "南唐",
            "江西": "南唐",
            "湖北": "荆南",
            "四川": "后蜀",
            "重庆": "后蜀",
            "福建": "闽国",
            "广东": "南汉",
            "广西": "南汉",
            "海南": "南汉",
            "湖南": "楚"
        };

        var option = {
            title: {
                text: "五代十国疆域范围",
                left: 'center',
                top: 10
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    var regime = provinceRegimeMap[params.name] || '未知';
                    return '<b>' + params.name + '</b><br/>所属政权：' + regime;
                }
            },
            series: [{
                type: 'map',
                map: 'china',
                label: {
                    show: true,
                    fontSize: 9,
                    color: '#333',
                    formatter: '{b}'
                },
                itemStyle: {
                    borderColor: '#555',
                    borderWidth: 0.5
                },
                regions: Object.keys(provinceColorMap).map(function(name) {
                    return {
                        name: name,
                        itemStyle: {
                            color: provinceColorMap[name],
                            areaColor: provinceColorMap[name]
                        }
                    };
                }),
                emphasis: {
                    itemStyle: {
                        areaColor: '#ffd700',
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: {
                        color: '#fff',
                        fontWeight: 'bold'
                    }
                },
                roam: false,
                zoom: 1.2,
                center: [104, 36]
            }],
            legend: {
                data: ["后周", "后蜀", "北汉", "南唐", "吴越", "荆南", "闽国", "南汉", "楚"],
                top: 50,
                selectedMode: true,
                type: 'scroll',
                orient: 'horizontal'
            }
        };
        chart.setOption(option);
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
