<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>visualMap 测试</title>
    <script src="https://assets.pyecharts.org/assets/v6/echarts.min.js"></script>
    <script src="https://assets.pyecharts.org/assets/v6/maps/china.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 800px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), 'white');

        var mapData = [
            {name: '北京', value: 1},
            {name: '天津', value: 1},
            {name: '河北', value: 1},
            {name: '河南', value: 2},
            {name: '山东', value: 2},
            {name: '山西', value: 3},
            {name: '陕西', value: 4},
            {name: '浙江', value: 5},
            {name: '江苏', value: 5},
            {name: '上海', value: 5},
            {name: '安徽', value: 5},
            {name: '江西', value: 6},
            {name: '湖北', value: 6},
            {name: '湖南', value: 7},
            {name: '四川', value: 8},
            {name: '重庆', value: 8},
            {name: '福建', value: 9},
            {name: '广东', value: 10},
            {name: '广西', value: 10},
            {name: '海南', value: 10},
            {name: '甘肃', value: 4},
            {name: '辽宁', value: 11},
            {name: '内蒙古', value: 12}
        ];

        var option = {
            title: {
                text: '五代十国政权地图 - visualMap 测试',
                left: 'center',
                top: 10
            },
            tooltip: {
                trigger: 'item'
            },
            series: [{
                type: 'map',
                map: 'china',
                data: mapData,
                label: {
                    show: true,
                    fontSize: 9,
                    color: '#333',
                    formatter: '{b}'
                },
                itemStyle: {
                    borderColor: '#555',
                    borderWidth: 0.5
                }
            }],
            visualMap: {
                type: 'piecewise',
                pieces: [
                    {value: 1, label: '后周', color: '#2ecc71'},
                    {value: 2, label: '后梁', color: '#e74c3c'},
                    {value: 3, label: '北汉', color: '#95a5a6'},
                    {value: 4, label: '后唐', color: '#3498db'},
                    {value: 5, label: '南唐', color: '#e74c3c'},
                    {value: 6, label: '荆南', color: '#1abc9c'},
                    {value: 7, label: '楚', color: '#3498db'},
                    {value: 8, label: '前后蜀', color: '#d35400'},
                    {value: 9, label: '闽国', color: '#9b59b6'},
                    {value: 10, label: '南汉', color: '#3498db'},
                    {value: 11, label: '辽', color: '#ff9999'},
                    {value: 12, label: '契丹', color: '#cccccc'}
                ],
                textStyle: {
                    color: '#333'
                },
                right: '10',
                top: '50'
            }
        };

        chart.setOption(option);
    </script>
</body>
</html>
