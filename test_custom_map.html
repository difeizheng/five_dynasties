<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>政权地图 - 自定义颜色</title>
    <script src="https://assets.pyecharts.org/assets/v6/echarts.min.js"></script>
    <script src="https://assets.pyecharts.org/assets/v6/maps/china.js"></script>
    <style>
        #map { width: 100%; height: 600px; }
        .tooltip { 
            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'));
        var option = {
            title: { text: '五代十国政权疆域图', left: 'center', top: 10 },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    return '<b>' + params.name + '</b><br/>所属政权：' + (params.data.regime || '无');
                }
            },
            series: [{
                type: 'map',
                map: 'china',
                data: [{"name": "河南", "value": 1, "itemStyle": {"color": "#e74c3c"}}, {"name": "山东", "value": 1, "itemStyle": {"color": "#e74c3c"}}, {"name": "陕西", "value": 1, "itemStyle": {"color": "#e74c3c"}}, {"name": "浙江", "value": 1, "itemStyle": {"color": "#1abc9c"}}, {"name": "江苏", "value": 1, "itemStyle": {"color": "#1abc9c"}}, {"name": "上海", "value": 1, "itemStyle": {"color": "#1abc9c"}}, {"name": "广东", "value": 1, "itemStyle": {"color": "#3498db"}}, {"name": "广西", "value": 1, "itemStyle": {"color": "#3498db"}}, {"name": "海南", "value": 1, "itemStyle": {"color": "#3498db"}}],
                label: { show: true, fontSize: 10 },
                itemStyle: {
                    borderColor: '#555',
                    borderWidth: 0.5
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#ffd700',
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: { color: '#fff', fontWeight: 'bold' }
                }
            }],
            legend: {
                data: ['后梁', '吴越', '南汉'],
                top: 50,
                selectedMode: true
            }
        };
        chart.setOption(option);
    </script>
</body>
</html>
