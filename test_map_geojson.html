<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>地图测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), 'white');

        // 使用 registerMap 注册 GeoJSON 地图
        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(response => response.json())
            .then(geoJson => {
                echarts.registerMap('china', geoJson);

                var mapData = [
                    {name: '河南省', value: 1},
                    {name: '浙江省', value: 1},
                    {name: '江苏省', value: 1}
                ];

                var option = {
                    title: {
                        text: "地图测试",
                        left: 'center',
                        top: 10
                    },
                    tooltip: {
                        trigger: 'item'
                    },
                    series: [{
                        type: 'map',
                        map: 'china',
                        data: mapData,
                        label: {
                            show: true,
                            fontSize: 9,
                            color: '#333'
                        },
                        itemStyle: {
                            borderColor: '#555',
                            borderWidth: 0.5,
                            areaColor: function(params) {
                                return params.value === 1 ? '#e74c3c' : '#f5f5f5';
                            }
                        }
                    }]
                };

                chart.setOption(option);
                console.log('Map loaded successfully');
            })
            .catch(err => {
                console.error('Failed to load map:', err);
            });
    </script>
</body>
</html>
