<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试其他 GeoJSON 源</title>
    <style>
        body { padding: 20px; font-family: Arial; }
        .status { margin: 10px 0; padding: 10px; background: #f0f0f0; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>测试 GeoJSON 数据源</h2>
    <div id="results"></div>
    <script>
        var sources = [
            {name: '阿里云 DataV (完整)', url: 'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json'},
            {name: '阿里云 DataV (简化)', url: 'https://geo.datav.aliyun.com/areas_v3/bound/100000.json'},
            {name: '高德地图', url: 'https://webapi.amap.com/maps?v=1.4.15&plugin=Map3D&key=your_key'},
            {name: 'npm echarts', url: 'https://npm.elemecdn.com/echarts@5.4.3/map/json/china.json'},
            {name: 'unpkg', url: 'https://unpkg.com/echarts@5.4.3/map/json/china.json'},
            {name: 'jsdelivr', url: 'https://jsdelivr.zenodo.com/record/5829656/files/china.json'},
            {name: 'github raw', url: 'https://raw.githubusercontent.com/echarts/maps/gh-pages/json/china.json'}
        ];

        var resultsDiv = document.getElementById('results');

        async function testSources() {
            for (var i = 0; i < sources.length; i++) {
                var source = sources[i];
                var div = document.createElement('div');
                div.className = 'status';
                div.innerHTML = '测试：' + source.name + '...';
                resultsDiv.appendChild(div);

                try {
                    var response = await fetch(source.url, {mode: 'cors'});
                    if (response.ok) {
                        var data = await response.json();
                        div.innerHTML = '<span class="success">✓ ' + source.name + ' 成功!</span>' +
                            ' (类型：' + data.type + ', 特征：' + (data.features ? data.features.length : 'N/A') + ')';
                    } else {
                        div.innerHTML = '<span class="error">✗ ' + source.name + ' 失败: HTTP ' + response.status + '</span>';
                    }
                } catch (err) {
                    div.innerHTML = '<span class="error">✗ ' + source.name + ' 失败: ' + err.message + '</span>';
                }
            }
        }

        testSources();
    </script>
</body>
</html>
