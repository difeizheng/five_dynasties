<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>政权地图测试</title>
    <script src="https://assets.pyecharts.org/assets/v6/echarts.min.js"></script>
    <script src="https://assets.pyecharts.org/assets/v6/maps/china.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), 'white');

        // 省份 - 政权映射
        var provinceRegimeMap = {
            "河南": "后周", "山东": "后周", "河北": "后周",
            "陕西": "后蜀", "四川": "后蜀", "重庆": "后蜀",
            "山西": "北汉",
            "安徽": "南唐", "江苏": "南唐", "江西": "南唐",
            "浙江": "吴越", "上海": "吴越",
            "湖北": "荆南",
            "福建": "闽国",
            "广东": "南汉", "广西": "南汉", "海南": "南汉",
            "湖南": "楚"
        };

        var option = {
            title: {
                text: "五代十国疆域范围",
                left: 'center',
                top: 10
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    var regime = provinceRegimeMap[params.name] || '未知';
                    return '<b>' + params.name + '</b><br/>所属政权：' + regime;
                }
            },
            series: [
                {
                    type: 'map',
                    map: 'china',
                    name: '后周',
                    data: [
                        {name: '河南', value: 1, itemStyle: {color: '#2ecc71'}},
                        {name: '山东', value: 1, itemStyle: {color: '#2ecc71'}},
                        {name: '河北', value: 1, itemStyle: {color: '#2ecc71'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '后蜀',
                    data: [
                        {name: '陕西', value: 1, itemStyle: {color: '#d35400'}},
                        {name: '四川', value: 1, itemStyle: {color: '#d35400'}},
                        {name: '重庆', value: 1, itemStyle: {color: '#d35400'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '北汉',
                    data: [
                        {name: '山西', value: 1, itemStyle: {color: '#95a5a6'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '南唐',
                    data: [
                        {name: '安徽', value: 1, itemStyle: {color: '#e74c3c'}},
                        {name: '江苏', value: 1, itemStyle: {color: '#e74c3c'}},
                        {name: '江西', value: 1, itemStyle: {color: '#e74c3c'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '吴越',
                    data: [
                        {name: '浙江', value: 1, itemStyle: {color: '#1abc9c'}},
                        {name: '上海', value: 1, itemStyle: {color: '#1abc9c'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '荆南',
                    data: [
                        {name: '湖北', value: 1, itemStyle: {color: '#1abc9c'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '闽国',
                    data: [
                        {name: '福建', value: 1, itemStyle: {color: '#9b59b6'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '南汉',
                    data: [
                        {name: '广东', value: 1, itemStyle: {color: '#3498db'}},
                        {name: '广西', value: 1, itemStyle: {color: '#3498db'}},
                        {name: '海南', value: 1, itemStyle: {color: '#3498db'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                },
                {
                    type: 'map',
                    map: 'china',
                    name: '楚',
                    data: [
                        {name: '湖南', value: 1, itemStyle: {color: '#3498db'}}
                    ],
                    label: {show: true, fontSize: 9, color: '#333', formatter: '{b}'},
                    itemStyle: {borderColor: '#555', borderWidth: 0.5}
                }
            ],
            legend: {
                data: ["后周", "后蜀", "北汉", "南唐", "吴越", "荆南", "闽国", "南汉", "楚"],
                top: 50,
                selectedMode: true,
                type: 'scroll'
            }
        };

        chart.setOption(option);
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
