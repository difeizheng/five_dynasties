<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>政权地图测试</title>
    <script src="https://assets.pyecharts.org/assets/v6/echarts.min.js"></script>
    <script src="https://assets.pyecharts.org/assets/v6/maps/china.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), 'white');

        var provinceRegimeMap = {
            "河南": "后周", "山东": "后周", "河北": "后周",
            "陕西": "后蜀", "四川": "后蜀", "重庆": "后蜀",
            "山西": "北汉",
            "安徽": "南唐", "江苏": "南唐", "江西": "南唐",
            "浙江": "吴越", "上海": "吴越",
            "湖北": "荆南",
            "福建": "闽国",
            "广东": "南汉", "广西": "南汉", "海南": "南汉",
            "湖南": "楚"
        };

        var mapData = [
            {name: "河南", value: 1, regime: "后周"},
            {name: "山东", value: 1, regime: "后周"},
            {name: "河北", value: 1, regime: "后周"},
            {name: "陕西", value: 2, regime: "后蜀"},
            {name: "四川", value: 2, regime: "后蜀"},
            {name: "重庆", value: 2, regime: "后蜀"},
            {name: "山西", value: 3, regime: "北汉"},
            {name: "安徽", value: 4, regime: "南唐"},
            {name: "江苏", value: 4, regime: "南唐"},
            {name: "江西", value: 4, regime: "南唐"},
            {name: "浙江", value: 5, regime: "吴越"},
            {name: "上海", value: 5, regime: "吴越"},
            {name: "湖北", value: 6, regime: "荆南"},
            {name: "福建", value: 7, regime: "闽国"},
            {name: "广东", value: 8, regime: "南汉"},
            {name: "广西", value: 8, regime: "南汉"},
            {name: "海南", value: 8, regime: "南汉"},
            {name: "湖南", value: 9, regime: "楚"}
        ];

        var option = {
            title: {
                text: "五代十国疆域范围",
                left: 'center',
                top: 10
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    var regime = provinceRegimeMap[params.name] || '未知';
                    return '<b>' + params.name + '</b><br/>所属政权：' + regime;
                }
            },
            series: [{
                type: 'map',
                map: 'china',
                data: mapData,
                label: {
                    show: true,
                    fontSize: 9,
                    color: '#333',
                    formatter: '{b}'
                },
                itemStyle: {
                    borderColor: '#555',
                    borderWidth: 0.5
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#ffd700',
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: {
                        color: '#fff',
                        fontWeight: 'bold'
                    }
                }
            }],
            visualMap: {
                show: false,
                type: 'piecewise',
                pieces: [
                    {value: 1, label: '后周', color: '#2ecc71'},
                    {value: 2, label: '后蜀', color: '#d35400'},
                    {value: 3, label: '北汉', color: '#95a5a6'},
                    {value: 4, label: '南唐', color: '#e74c3c'},
                    {value: 5, label: '吴越', color: '#1abc9c'},
                    {value: 6, label: '荆南', color: '#1abc9c'},
                    {value: 7, label: '闽国', color: '#9b59b6'},
                    {value: 8, label: '南汉', color: '#3498db'},
                    {value: 9, label: '楚', color: '#3498db'}
                ]
            },
            legend: {
                data: ['后周', '后蜀', '北汉', '南唐', '吴越', '荆南', '闽国', '南汉', '楚'],
                top: 50,
                selectedMode: true,
                type: 'scroll',
                orient: 'horizontal'
            }
        };

        chart.setOption(option);
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
