<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>政权地图 - visualMap 完整测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 800px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), 'white');

        // 实际数据 - 使用中国地图 JS 中的标准省份名称
        var mapData = [
            {name: '河南省', value: 1, regime: '后周'},
            {name: '山东省', value: 1, regime: '后周'},
            {name: '河北省', value: 1, regime: '后周'},
            {name: '安徽省', value: 1, regime: '后周'},
            {name: '山西省', value: 2, regime: '北汉'},
            {name: '陕西省', value: 3, regime: '后唐'},
            {name: '甘肃省', value: 3, regime: '后唐'},
            {name: '江苏省', value: 4, regime: '南唐'},
            {name: '浙江省', value: 4, regime: '南唐'},
            {name: '上海市', value: 4, regime: '南唐'},
            {name: '江西省', value: 4, regime: '南唐'},
            {name: '湖北省', value: 5, regime: '荆南'},
            {name: '湖南省', value: 6, regime: '楚'},
            {name: '四川省', value: 7, regime: '后蜀'},
            {name: '重庆市', value: 7, regime: '后蜀'},
            {name: '福建省', value: 8, regime: '闽国'},
            {name: '广东省', value: 9, regime: '南汉'},
            {name: '广西', value: 9, regime: '南汉'},
            {name: '海南省', value: 9, regime: '南汉'},
            {name: '辽宁省', value: 10, regime: '辽'},
            {name: '内蒙古', value: 11, regime: '契丹'}
        ];

        var pieces = [
            {value: 1, label: '后周', color: '#2ecc71'},
            {value: 2, label: '北汉', color: '#95a5a6'},
            {value: 3, label: '后唐', color: '#3498db'},
            {value: 4, label: '南唐', color: '#e74c3c'},
            {value: 5, label: '荆南', color: '#1abc9c'},
            {value: 6, label: '楚', color: '#3498db'},
            {value: 7, label: '后蜀', color: '#d35400'},
            {value: 8, label: '闽国', color: '#9b59b6'},
            {value: 9, label: '南汉', color: '#3498db'},
            {value: 10, label: '辽', color: '#ff9999'},
            {value: 11, label: '契丹', color: '#cccccc'}
        ];

        var option = {
            title: {
                text: '五代十国政权地图 - visualMap 完整测试',
                left: 'center',
                top: 10
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    return '<b>' + params.name + '</b><br/>所属政权：' + params.data.regime + ' (value=' + params.value + ')';
                }
            },
            series: [{
                type: 'map',
                map: 'china',
                data: mapData,
                label: {
                    show: true,
                    fontSize: 8,
                    color: '#333',
                    formatter: '{b}'
                },
                itemStyle: {
                    borderColor: '#555',
                    borderWidth: 0.5
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#ffd700'
                    }
                }
            }],
            visualMap: {
                type: 'piecewise',
                show: true,
                left: 'right',
                top: '80',
                pieces: pieces,
                textStyle: {
                    color: '#333'
                }
            }
        };

        chart.setOption(option);
        console.log('Map option set successfully');
        console.log('Data:', mapData);
        console.log('Pieces:', pieces);
    </script>
</body>
</html>
