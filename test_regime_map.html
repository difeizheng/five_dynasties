<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>政权地图测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var regimeColors = {
            "后周": "#2ecc71", "后梁": "#e74c3c", "后唐": "#3498db",
            "后晋": "#9b59b6", "后汉": "#e67e22", "后蜀": "#d35400",
            "北汉": "#95a5a6", "南唐": "#e74c3c", "吴越": "#1abc9c",
            "闽国": "#9b59b6", "南汉": "#3498db", "楚": "#3498db",
            "荆南": "#1abc9c", "前蜀": "#f39c12"
        };

        var provinceRegimeMap = {
            "河南省": "后周", "山东省": "后周", "河北省": "后周", "安徽省": "后周",
            "山西省": "北汉",
            "陕西省": "后唐", "甘肃省": "后唐",
            "江苏省": "南唐", "浙江省": "南唐", "上海市": "南唐", "江西省": "南唐",
            "湖北省": "荆南",
            "湖南省": "楚",
            "四川省": "后蜀", "重庆市": "后蜀",
            "福建省": "闽国",
            "广东省": "南汉", "广西": "南汉", "海南省": "南汉"
        };

        var regimes = ["后周", "北汉", "后唐", "南唐", "荆南", "楚", "后蜀", "闽国", "南汉"];

        fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
            .then(response => response.json())
            .then(geoJson => {
                echarts.registerMap('china', geoJson);

                var mapData = [];
                for (var province in provinceRegimeMap) {
                    mapData.push({name: province, regime: provinceRegimeMap[province]});
                }

                var chart = echarts.init(document.getElementById('map'), 'white');

                var option = {
                    title: {
                        text: regimes.join(' ') + ' 疆域范围',
                        left: 'center',
                        top: 10
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: function(params) {
                            var regime = provinceRegimeMap[params.name] || '未知';
                            return '<b>' + params.name + '</b><br/>所属政权：' + regime;
                        }
                    },
                    series: [{
                        type: 'map',
                        map: 'china',
                        data: mapData,
                        label: {
                            show: true,
                            fontSize: 9,
                            color: '#333',
                            formatter: '{b}'
                        },
                        itemStyle: {
                            borderColor: '#555',
                            borderWidth: 0.5,
                            areaColor: function(params) {
                                var regime = provinceRegimeMap[params.name];
                                return regimeColors[regime] || '#f5f5f5';
                            }
                        },
                        emphasis: {
                            itemStyle: {
                                areaColor: '#ffd700',
                                borderColor: '#fff',
                                borderWidth: 2
                            },
                            label: {
                                color: '#fff',
                                fontWeight: 'bold'
                            }
                        }
                    }],
                    legend: {
                        data: regimes,
                        top: 50,
                        selectedMode: true,
                        type: 'scroll',
                        orient: 'horizontal'
                    }
                };

                chart.setOption(option);
                console.log('Map option set successfully');
            })
            .catch(err => {
                console.error('Failed to load map:', err);
                document.getElementById('map').innerHTML = '地图加载失败';
            });

        window.addEventListener('resize', function() {
            var chart = echarts.getInstanceByDom(document.getElementById('map'));
            if (chart) chart.resize();
        });
    </script>
</body>
</html>
