<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>都城分布测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        #map { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'), 'white');

        var mapData = [
            {name: '河南省', value: 1},
            {name: '浙江省', value: 1},
            {name: '江苏省', value: 1},
            {name: '四川省', value: 1},
            {name: '福建省', value: 1},
            {name: '广东省', value: 1},
            {name: '湖南省', value: 1},
            {name: '湖北省', value: 1},
            {name: '山西省', value: 1}
        ];

        var option = {
            title: {
                text: "五代十国都城分布",
                left: 'center',
                top: 10
            },
            tooltip: {
                trigger: 'item',
                formatter: '<b>{b}</b>: 都城所在地'
            },
            series: [{
                type: 'map',
                map: 'china',
                data: mapData,
                label: {
                    show: true,
                    fontSize: 9,
                    color: '#333',
                    formatter: '{b}'
                },
                itemStyle: {
                    borderColor: '#555',
                    borderWidth: 0.5,
                    areaColor: function(params) {
                        if (params.value && params.value === 1) {
                            return '#e74c3c';
                        }
                        return '#f5f5f5';
                    }
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#ffd700'
                    }
                }
            }],
            visualMap: {
                type: 'piecewise',
                show: true,
                left: 'right',
                top: '50',
                pieces: [
                    {value: 1, label: '都城所在地', color: '#e74c3c'}
                ],
                textStyle: {
                    color: '#333'
                }
            }
        };

        chart.setOption(option);
        console.log('Capital map option set');
    </script>
</body>
</html>
